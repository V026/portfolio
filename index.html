<div class="container">

Koneti <span>Trivikram</span>

<p class="typing">
<span id="text"></span>

<button class="btn">About Me</button>

<button class="btn">Download Resume</button>
</a>
</a>

</div>
<script>

const roles=[
"Frontend Developer",
"RF Engineer",
"Embedded Engineer"
];

let index=0;
let charIndex=0;

function type(){

let text=document.getElementById("text");

if(charIndex<roles[index].length){

text.innerHTML += roles[index].charAt(charIndex);

charIndex++;

setTimeout(type,100);

}

else{

setTimeout(erase,1500);

}

}


function erase(){

let text=document.getElementById("text");

if(charIndex>0){

text.innerHTML=
roles[index].substring(0,charIndex-1);

charIndex--;

setTimeout(erase,50);

}

else{

index++;

if(index>=roles.length){

index=0;

}

setTimeout(type,300);

}

}

type();

</script>
</body>
<div class="particles"></div>
<div class="cursor"></div>
